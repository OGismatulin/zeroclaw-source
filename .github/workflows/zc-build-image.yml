name: ZC Build and Push Image

# Build the ghcr.io/ogismatulin/zeroclaw runtime image from this fork.
# Prefixed zc- to avoid colliding with upstream workflow names on merges.

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    concurrency:
      group: zc-build-image
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GHCR_TOKEN is a PAT with write:packages scope. The default
          # GITHUB_TOKEN cannot push to the ghcr.io/ogismatulin/zeroclaw
          # package because the package is bound to a different repo
          # (OGismatulin/zeroclaw, not OGismatulin/zeroclaw-source) and
          # GitHub provides no public API to rebind packages.
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ogismatulin/zeroclaw
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.deploy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
