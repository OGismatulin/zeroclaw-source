name: ZC Fly Deploy

# Deploy the ghcr.io/ogismatulin/zeroclaw:latest image to Fly (ai-forge-zeroclaw).
# Chained after zc-build-image success, or manual via workflow_dispatch.

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ZC Build and Push Image"]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: zc-deploy-group
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --image ghcr.io/ogismatulin/zeroclaw:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
