app = 'ai-forge-zeroclaw'
primary_region = 'iad'

# OOM safety buffer on the 2GB VM (no swap by default on Fly Machines).
# Lives on root-FS, not the /zeroclaw-data volume. Guards against daemon
# OOM-kill under concurrent load; not a substitute for RAM — heavy swapping
# on shared-CPU degrades latency. See docs/analysis on memory pressure.
swap_size_mb = 512

[build]
  dockerfile = 'Dockerfile'

[env]
  # ZEROCLAW_PROVIDER = 'minimax'
  # ZEROCLAW_MODEL = 'minimax-m2.7'
  # ZEROCLAW_PROVIDER = 'openai-codex'
  # ZEROCLAW_MODEL = 'gpt-5.4'
  # ZEROCLAW_PROVIDER = 'glm'
  # ZEROCLAW_MODEL = 'glm-5-turbo'
  # ZEROCLAW_PROVIDER = 'zai'
  # ZEROCLAW_MODEL = 'glm-5-turbo'
  # ZEROCLAW_PROVIDER = 'wafer'
  # ZEROCLAW_MODEL = 'GLM-5.1'
  ZEROCLAW_PROVIDER = 'opencode-go'
  ZEROCLAW_MODEL = 'deepseek-v4-flash'
  ZEROCLAW_MANAGER_HOST = '0.0.0.0'
  ZEROCLAW_MANAGER_PORT = '3000'
  ZEROCLAW_MANAGER_BASE_PORT = '3001'
  ZEROCLAW_MANAGER_REQUEST_TIMEOUT_SECS = '1800'
  ZEROCLAW_MANAGER_MAX_INSTANCES = '6'
  # Cold daemon boot loads 5 MCP servers (deferred_loading=false); 25s default
  # is too short when all daemons cold-boot at once after a deploy/restart
  # (warmed=0 incident 2026-07-10). See analysis 2026-07-10-cold-boot-health-window.
  ZEROCLAW_MANAGER_HEALTH_TIMEOUT_SECS = '90'
  ZEROCLAW_CHILD_HOST = '127.0.0.1'
  ZEROCLAW_AUTONOMY_LEVEL = 'full'
  ZEROCLAW_GATEWAY_TIMEOUT_SECS = '1800'
  ZEROCLAW_REASONING_EFFORT = 'medium'
  # Provider-fallback observability (stabilization 2026-06-13): operator gets a
  # deduped Telegram alert when a turn answered via a DIFFERENT provider/model.
  # Empty operator → alerts disabled; this activates them. Oleg = 83292437.
  ZEROCLAW_OPERATOR_USER_ID = '83292437'
  PROVIDER_FALLBACK_ALERT_WINDOW_SECS = '1800'
  RUST_LOG = 'zeroclaw=trace,hyper=info'
  PG_STAGE_HOST = 'stage.postgres.kube-two.yallasvc.net'
  PG_STAGE_PORT = '6432'
  PG_PROD_HOST = 'slave.db.yallasvc.net'
  PG_PROD_PORT = '5432'
  PG_PROD_CATALOG_HOST = 'slave.catalog.db.yallasvc.net'
  MCP_DB_PORT = '4000'
  GRAYLOG_BASE_URL = 'https://graylog.yallasvc.net'
  GRAYLOG_MCP_PORT = '4001'
  GRAYLOG_KEEPALIVE_INTERVAL_S = '1500'
  GRAYLOG_REFRESH_INTERVAL_S = '1500'
  GRAYLOG_OPERATOR_TELEGRAM_USER_ID = '83292437'

  # Public URLs — plain env, not secrets. Values are non-sensitive (own app domain + CRM base URL).
  # Kept here instead of fly secrets so the integration wiring is visible in git.
  NOTIFY_URL = 'https://ai-forge-bot.fly.dev/zeroclaw/notify'
  NOTIFY_FILE_URL = 'https://ai-forge-bot.fly.dev/zeroclaw/notify/file'
  CREATIO_BASE_URL = 'https://lalafo.creatio.com'

[mounts]
  source = 'zeroclaw_data'
  destination = '/zeroclaw-data'
  processes = ['app']

[http_service]
  internal_port = 3000
  force_https = false
  # autostop disabled 2026-05-21: cron retro (3:00 UTC) must run on schedule.
  # autostop killed the scheduler tokio task and led to retro racing with
  # the first user webhook of the morning. See docs/analysis/2026-05-21-deploy-cron-race-fix.md.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.http_options]
    idle_timeout = 900

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    timeout = '5s'
    path = '/health'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
